# Optimization Thresholds & Guardrails
# These control when AI recommends or takes action

alerts:
  roas_floor: 1.5              # Alert if campaign ROAS drops below this
  cpa_ceiling: 50.0            # Alert if CPA exceeds this (set to your target)
  spend_anomaly_pct: 30        # Alert if daily spend deviates >30% from average
  funnel_drop_pct: 20          # Alert if conversion rate drops >20% vs 7-day average
  ctr_decline_days: 7          # Alert if CTR declines for this many consecutive days

google_ads:
  search_term_waste_ceiling: 20.0  # alert if >$20/week wasted on zero-conversion terms
  quality_score_floor: 5           # alert if any keyword drops below this

seo:
  ranking_drop_threshold: 5        # positions lost to trigger alert
  striking_distance_min_impressions: 100  # min impressions to consider a keyword

budget_rules:
  max_daily_shift_pct: 20      # Never shift more than 20% of a campaign's budget per day
  min_campaign_daily_spend: 10 # Never drop a campaign below $10/day
  min_days_before_decision: 7  # Require at least 7 days of data before recommending changes

creative_rules:
  max_ad_age_days: 30          # Flag ads running longer than this
  min_impressions_to_judge: 1000  # Need at least 1000 impressions before judging an ad
  min_conversions_to_judge: 10    # Need at least 10 conversions for statistical confidence

autonomy_levels:
  # What the AI can do without asking you
  auto_execute:
    - "pause_ad_roas_below_0.5"      # Pause ads with ROAS below 0.5 (losing money fast)

  # What the AI recommends and you approve
  requires_approval:
    - "budget_reallocation"
    - "pause_campaign"
    - "launch_new_creative"
    - "keyword_changes"

gads_health:
  roas_warn_floor: 2.5             # Campaign 7-day ROAS below this triggers WARN
  campaign_min_spend_7d: 20.0      # Min spend to evaluate ROAS (avoid noise on tiny campaigns)
  zero_conv_spend_floor: 50.0      # Campaign spend floor for zero-conversion alert (14d)
  spend_anomaly_pct: 25            # Alert if yesterday spend deviates >25% from 7-day avg
  impression_share_brand_floor: 0.50  # Brand search IS below 50% = WARN
  waste_term_floor_7d: 10.0        # Single search term wasting ≥$10 in 7 days
  total_waste_pct_warn: 20.0       # Total wasted spend >20% of weekly spend
  quality_score_floor: 5           # Keyword QS below this = WARN
  kw_spend_floor_30d: 5.0          # Min 30-day spend to flag a QS issue
  keyword_waste_floor: 30.0        # Keyword all-time wasted spend floor for WARN
  broad_match_pct_warn: 40.0       # Broad match >40% of campaign spend = WARN
  shopping_roas_floor: 2.5         # Shopping 7-day ROAS floor
  shopping_min_spend_7d: 30.0      # Min Shopping spend to evaluate ROAS
  product_waste_floor_7d: 15.0     # Product wasted spend floor per 7 days
  budget_minimum: 10.0             # ENABLED campaign daily budget minimum
  cpc_spike_multiplier: 2.0        # CPC > 2× 14-day avg triggers WARN
  account_cvr_floor: 0.005         # Account CVR floor (0.5%)
  account_cvr_min_spend: 100.0     # Min weekly spend to evaluate account CVR

autonomy:
  shadow_mode: true                # Proposals created, never auto-executed
  max_proposals_per_run: 10        # Cap proposals per --propose invocation
  kill_switch:
    metric: blended_mer            # From vw_true_roas
    threshold: 1.0                 # Below 1.0 = losing money on every dollar
    lookback_days: 14
    action: alert_pause_all        # Recommend pausing all paid ads
