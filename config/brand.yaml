    their_angle: "Wholesale/B2B model, broader lifestyle play beyond just pickleball"
    pe_differentiator: "PE is DTC with a built-in audience of 60K+ engaged players. UDrippin is wholesale -- different model."

  - name: "Flick Weight"
    url: "https://www.flickweight.com"
    what_they_sell: "Paddle handle weights (copper, tungsten, lead), edge tape"
    their_angle: "Niche specialist in paddle weighting, performance-focused copy, multiple material options"
    pe_differentiator: "PE sells tungsten tape + SLYCE caps in same category, but backed by Braydon's review credibility and tuning lab content"

